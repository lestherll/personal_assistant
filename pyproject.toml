[project]
name = "personal-assistant"
version = "0.1.0"
description = "A modular AI personal assistant built on LangChain agents and configurable workspaces."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "langchain>=0.3",
    "langchain-anthropic>=0.3",
    "langchain-core>=0.3",
    "langchain-ollama>=1.0.1",
    "langgraph>=0.2",
    "pydantic>=2.0",
    "python-dotenv>=1.2.2",
]
